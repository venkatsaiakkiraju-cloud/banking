spring.application.name=loan-service
server.port=8085
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/securebank
spring.datasource.username=${DB_USERNAME:securebank}
spring.datasource.password=${DB_PASSWORD:securebank123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=${JWT_SECRET:SecureBankJWTSecretKey2024VeryLongSecretKeyForSecurity}
jwt.expiration=${JWT_EXPIRATION:86400000}
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
logging.level.com.securebank=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=/var/log/securebank/loan-service.log
